<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - ABC College</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">
            <h1>SRM Engineering and Technology</h1>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="courses.html">Courses</a></li>
                <li><a href="faculty.html">Faculty</a></li>
                <li><a href="student-login.html">Student Login</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="page-shell">
            <div class="form-card">
                <p class="eyebrow">Get in Touch</p>
                <h2>Contact Us</h2>
                <form>
                    <label for="name">Name</label>
                    <input type="text" id="name" placeholder="Your name">

                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Your email">

                    <label for="message">Message</label>
                    <textarea id="message" rows="4" placeholder="Write your message"></textarea>

                    <button type="submit">Send</button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <p>© 2026 ABC College | Student Portal</p>
    </footer>
</body>
</html>
